---
services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - TZ=Europe/Bucharest
    volumes:
      - ${SONARR_DATA}/config:/config
      - ${NFS_PUBLIC_DIR}:/nfs
    ports:
      - ${SONARR_PORT}:8989
    restart: unless-stopped
    networks:
      - sonarr_network

networks:
  sonarr_network:
    driver: bridge
    ipam:
      config:
        - subnet: ${SONARR_NETWORK}
